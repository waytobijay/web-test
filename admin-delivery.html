<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Admin — Bista Group</title>
<link rel="stylesheet" href="css/admin-roles.css">
</head>
<body class="dl-theme">

<header class="role-header">
  <div class="role-header-left">
    <div class="role-icon">🚚</div>
    <div>
      <div class="role-title">Delivery Admin</div>
      <div class="role-subtitle" id="dl-admin-name">Loading…</div>
    </div>
  </div>
  <div class="role-header-right">
    <a href="index.html" target="_blank" class="btn-outline btn-sm">🌐 View Site</a>
    <button class="signout-btn" onclick="doSignOut()">Sign Out</button>
  </div>
</header>

<main class="role-body">

  <!-- Stats -->
  <div class="stats-row" id="dl-stats"></div>

  <!-- Orders Table -->
  <div class="role-card">
    <h3>🚚 Orders Ready for Delivery</h3>
    <div class="filter-bar">
      <select id="dl-filter" onchange="renderDLOrders()">
        <option value="">All Relevant Orders</option>
        <option value="warehouse_ready">Ready for Delivery</option>
        <option value="in_delivery">Out for Delivery</option>
        <option value="not_delivered">Not Delivered</option>
      </select>
      <button class="btn-primary btn-sm" onclick="renderDLOrders()">🔄 Refresh</button>
    </div>
    <div class="r-table-wrap"><div id="dl-orders-table"></div></div>
  </div>

  <!-- Detail Panel -->
  <div class="role-card detail-panel" id="dl-detail">
    <div class="detail-header">
      <h3>Order Detail &amp; Dispatch</h3>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="dl-detail-content"></div>
    <div id="dl-msg" class="form-msg"></div>
  </div>

</main>

<script src="js/data-service.js"></script>
<script>
const ALLOWED = ['master','delivery'];
let _session = null;

document.addEventListener('DOMContentLoaded', async () => {
  _session = DS.requireAuth(ALLOWED, 'admin-login.html');
  if (!_session) return;
  document.getElementById('dl-admin-name').textContent = _session.name + ' (' + _session.role + ')';
  await renderDLOrders();
  await renderDLStats();
});

async function renderDLStats() {
  const orders = await DS.getOrders();
  const ready   = orders.filter(o=>o.status==='warehouse_ready').length;
  const inDel   = orders.filter(o=>o.status==='in_delivery').length;
  const notDel  = orders.filter(o=>o.status==='not_delivered').length;
  const done    = orders.filter(o=>o.status==='delivered').length;
  const el = document.getElementById('dl-stats');
  if (el) el.innerHTML = [
    { num:ready,  lbl:'Ready to Dispatch', color:'#3b82f6' },
    { num:inDel,  lbl:'Out for Delivery',  color:'#8b5cf6' },
    { num:notDel, lbl:'Not Delivered',     color:'#ef4444' },
    { num:done,   lbl:'Delivered Today',   color:'#22c55e' }
  ].map(s=>`<div class="stat-box"><div class="stat-num" style="color:${s.color};">${s.num}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');
}

async function renderDLOrders() {
  const el = document.getElementById('dl-orders-table'); if (!el) return;
  el.innerHTML = '<p style="color:var(--text-muted);font-size:.84rem;padding:.5rem;">Loading…</p>';
  const filterVal = document.getElementById('dl-filter')?.value;
  const all = await DS.getOrders();
  const orders = filterVal
    ? all.filter(o=>o.status===filterVal)
    : all.filter(o=>['warehouse_ready','in_delivery','not_delivered'].includes(o.status));
  if (!orders.length) { el.innerHTML='<p style="color:var(--text-muted);font-size:.84rem;padding:.5rem;">No orders to dispatch.</p>'; return; }
  el.innerHTML=`<table class="r-table"><thead><tr><th>Order ID</th><th>Customer</th><th>Address</th><th>Provider</th><th>Status</th><th>Date</th><th>Action</th></tr></thead><tbody>
    ${orders.map(o=>{
      const si=DS.statusInfo(o.status);
      const cust=Object.values(o.customer||{})[0]||'—';
      const addr=o.customer?.['Address']||o.customer?.address||'—';
      const date=o.createdAt?new Date(o.createdAt).toLocaleDateString():'—';
      return `<tr><td><code style="font-size:.73rem;">${esc(o.id)}</code></td>
        <td>${esc(cust)}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(addr)}">${esc(addr)}</td>
        <td>${esc(o.provider||o.fulfillment||'—')}</td>
        <td><span class="status-badge" style="background:${si.color}22;color:${si.color};border:1px solid ${si.color}44;">${si.icon} ${si.label}</span></td>
        <td>${date}</td>
        <td><button class="btn-primary btn-sm" onclick="openDetail('${esc(o.id)}')">Manage</button></td></tr>`;
    }).join('')}</tbody></table>`;
}

async function openDetail(orderId) {
  const orders = await DS.getOrders();
  const o = orders.find(x=>x.id===orderId); if(!o) return;
  const si = DS.statusInfo(o.status);
  const cust = Object.entries(o.customer||{}).map(([k,v])=>`<div class="detail-row"><span class="detail-label">${esc(k)}</span><span>${esc(v)}</span></div>`).join('');
  const msg = document.getElementById('dl-msg');
  if (msg) { msg.className='form-msg'; msg.textContent=''; }
  document.getElementById('dl-detail-content').innerHTML=`
    <div class="detail-grid">
      <div>
        <div class="detail-row"><span class="detail-label">Order ID</span><code style="font-size:.78rem;">${esc(o.id)}</code></div>
        <div class="detail-row"><span class="detail-label">Status</span><span class="status-badge" style="background:${si.color}22;color:${si.color};border:1px solid ${si.color}44;">${si.icon} ${si.label}</span></div>
        <div class="detail-row"><span class="detail-label">Fulfillment</span><span>${esc(o.fulfillment||'—')}</span></div>
        <div class="detail-row"><span class="detail-label">Provider</span><span>${esc(o.provider||'—')}</span></div>
        <div class="detail-row"><span class="detail-label">Total</span><span>रू ${(o.total||0).toLocaleString()}</span></div>
        <div class="detail-row"><span class="detail-label">Date</span><span>${o.createdAt?new Date(o.createdAt).toLocaleString():'—'}</span></div>
      </div>
      <div>
        <div style="font-size:.8rem;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;">CUSTOMER</div>
        ${cust}
      </div>
    </div>
    <h4 style="margin:.8rem 0 .6rem;font-size:.9rem;">Update Delivery Status</h4>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap;">
      <div class="form-group" style="flex:1;min-width:180px;">
        <label>New Status</label>
        <select id="dl-new-status">
          <option value="in_delivery"   ${o.status==='in_delivery'?'selected':''}>🟣 Out for Delivery</option>
          <option value="not_delivered" ${o.status==='not_delivered'?'selected':''}>🔴 Not Delivered</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;min-width:180px;">
        <label>Comment (optional)</label>
        <input type="text" id="dl-comment" placeholder="e.g. Driver dispatched...">
      </div>
    </div>
    <button class="btn-primary" onclick="updateDLStatus('${esc(o.id)}')">✓ Update Status</button>`;
  const panel = document.getElementById('dl-detail');
  panel.classList.add('open');
  panel.scrollIntoView({ behavior:'smooth' });
}

async function updateDLStatus(orderId) {
  const status  = document.getElementById('dl-new-status')?.value;
  const comment = document.getElementById('dl-comment')?.value.trim()||'';
  const msg = document.getElementById('dl-msg');
  try {
    await DS.updateOrderStatus(orderId, status, comment, _session?.name||'Delivery');
    msg.textContent='✓ Status updated!'; msg.className='form-msg success';
    await renderDLOrders(); await renderDLStats();
    setTimeout(()=>{ msg.className='form-msg'; closeDetail(); }, 1500);
  } catch(e) { msg.textContent='Error updating status.'; msg.className='form-msg error'; }
}

function closeDetail() { document.getElementById('dl-detail')?.classList.remove('open'); }

function doSignOut() {
  if (!confirm('Sign out?')) return;
  DS.clearSession(); window.location.href = 'admin-login.html';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
