<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Admin — Bista Group</title>
<link rel="stylesheet" href="css/admin-roles.css">
</head>
<body class="ql-theme">

<header class="role-header">
  <div class="role-header-left">
    <div class="role-icon">✅</div>
    <div>
      <div class="role-title">Quality Admin</div>
      <div class="role-subtitle" id="ql-admin-name">Loading…</div>
    </div>
  </div>
  <div class="role-header-right">
    <a href="index.html" target="_blank" class="btn-outline btn-sm">🌐 View Site</a>
    <button class="signout-btn" onclick="doSignOut()">Sign Out</button>
  </div>
</header>

<main class="role-body">

  <!-- Stats -->
  <div class="stats-row" id="ql-stats"></div>

  <!-- Orders Table -->
  <div class="role-card">
    <h3>✅ Delivery Confirmation</h3>
    <div class="filter-bar">
      <select id="ql-filter" onchange="renderQLOrders()">
        <option value="">All Relevant Orders</option>
        <option value="in_delivery">Out for Delivery</option>
        <option value="delivered">Delivered</option>
        <option value="not_delivered">Not Delivered</option>
      </select>
      <button class="btn-primary btn-sm" onclick="renderQLOrders()">🔄 Refresh</button>
    </div>
    <div class="r-table-wrap"><div id="ql-orders-table"></div></div>
  </div>

  <!-- Detail Panel -->
  <div class="role-card detail-panel" id="ql-detail">
    <div class="detail-header">
      <h3>Confirm Delivery &amp; Feedback</h3>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="ql-detail-content"></div>
    <div id="ql-msg" class="form-msg"></div>
  </div>

</main>

<script src="js/data-service.js"></script>
<script>
const ALLOWED = ['master','quality'];
let _session = null;

document.addEventListener('DOMContentLoaded', async () => {
  _session = DS.requireAuth(ALLOWED, 'admin-login.html');
  if (!_session) return;
  document.getElementById('ql-admin-name').textContent = _session.name + ' (' + _session.role + ')';
  await renderQLOrders();
  await renderQLStats();
});

async function renderQLStats() {
  const orders = await DS.getOrders();
  const inDel   = orders.filter(o=>o.status==='in_delivery').length;
  const deliv   = orders.filter(o=>o.status==='delivered').length;
  const notDel  = orders.filter(o=>o.status==='not_delivered').length;
  const total   = orders.length;
  const el = document.getElementById('ql-stats');
  if (el) el.innerHTML = [
    { num:inDel,  lbl:'Awaiting Confirmation', color:'#8b5cf6' },
    { num:deliv,  lbl:'Delivered',             color:'#22c55e' },
    { num:notDel, lbl:'Not Delivered',         color:'#ef4444' },
    { num:total,  lbl:'Total Orders',          color:'#60a5fa' }
  ].map(s=>`<div class="stat-box"><div class="stat-num" style="color:${s.color};">${s.num}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');
}

async function renderQLOrders() {
  const el = document.getElementById('ql-orders-table'); if (!el) return;
  el.innerHTML = '<p style="color:var(--text-muted);font-size:.84rem;padding:.5rem;">Loading…</p>';
  const filterVal = document.getElementById('ql-filter')?.value;
  const all = await DS.getOrders();
  const orders = filterVal
    ? all.filter(o=>o.status===filterVal)
    : all.filter(o=>['in_delivery','delivered','not_delivered'].includes(o.status));
  if (!orders.length) { el.innerHTML='<p style="color:var(--text-muted);font-size:.84rem;padding:.5rem;">No orders pending confirmation.</p>'; return; }
  el.innerHTML=`<table class="r-table"><thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Feedback</th><th>Date</th><th>Action</th></tr></thead><tbody>
    ${orders.map(o=>{
      const si=DS.statusInfo(o.status);
      const cust=Object.values(o.customer||{})[0]||'—';
      const items=(o.items||[]).map(i=>i.name+'×'+i.qty).join(', ');
      const date=o.createdAt?new Date(o.createdAt).toLocaleDateString():'—';
      const feedback=o.customerFeedback?'⭐'+o.customerRating+'/5':'—';
      return `<tr><td><code style="font-size:.73rem;">${esc(o.id)}</code></td>
        <td>${esc(cust)}</td>
        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(items)}">${esc(items)}</td>
        <td>रू ${(o.total||0).toLocaleString()}</td>
        <td><span class="status-badge" style="background:${si.color}22;color:${si.color};border:1px solid ${si.color}44;">${si.icon} ${si.label}</span></td>
        <td>${esc(feedback)}</td>
        <td>${date}</td>
        <td><button class="btn-primary btn-sm" onclick="openDetail('${esc(o.id)}')">Confirm</button></td></tr>`;
    }).join('')}</tbody></table>`;
}

async function openDetail(orderId) {
  const orders = await DS.getOrders();
  const o = orders.find(x=>x.id===orderId); if(!o) return;
  const si = DS.statusInfo(o.status);
  const cust = Object.entries(o.customer||{}).map(([k,v])=>`<div class="detail-row"><span class="detail-label">${esc(k)}</span><span>${esc(v)}</span></div>`).join('');
  const msg = document.getElementById('ql-msg');
  if (msg) { msg.className='form-msg'; msg.textContent=''; }
  document.getElementById('ql-detail-content').innerHTML=`
    <div class="detail-grid">
      <div>
        <div class="detail-row"><span class="detail-label">Order ID</span><code style="font-size:.78rem;">${esc(o.id)}</code></div>
        <div class="detail-row"><span class="detail-label">Status</span><span class="status-badge" style="background:${si.color}22;color:${si.color};border:1px solid ${si.color}44;">${si.icon} ${si.label}</span></div>
        <div class="detail-row"><span class="detail-label">Gateway</span><span>${esc(o.gateway||'—')}</span></div>
        <div class="detail-row"><span class="detail-label">Total</span><span>रू ${(o.total||0).toLocaleString()}</span></div>
        <div class="detail-row"><span class="detail-label">Date</span><span>${o.createdAt?new Date(o.createdAt).toLocaleString():'—'}</span></div>
      </div>
      <div>
        <div style="font-size:.8rem;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;">CUSTOMER</div>
        ${cust}
      </div>
    </div>
    <h4 style="margin:.8rem 0 .6rem;font-size:.9rem;">Confirm Delivery Outcome</h4>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap;">
      <div class="form-group" style="flex:1;min-width:180px;">
        <label>Delivery Result</label>
        <select id="ql-new-status">
          <option value="delivered"     ${o.status==='delivered'?'selected':''}>🟢 Delivered Successfully</option>
          <option value="not_delivered" ${o.status==='not_delivered'?'selected':''}>🔴 Not Delivered</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;min-width:180px;">
        <label>Comment</label>
        <input type="text" id="ql-comment" placeholder="e.g. Customer received package">
      </div>
    </div>
    <h4 style="margin:.8rem 0 .6rem;font-size:.9rem;">Customer Feedback (optional)</h4>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap;">
      <div class="form-group" style="min-width:140px;">
        <label>Rating (1–5)</label>
        <select id="ql-rating">
          <option value="">—</option>
          <option value="5">⭐⭐⭐⭐⭐ (5)</option>
          <option value="4">⭐⭐⭐⭐ (4)</option>
          <option value="3">⭐⭐⭐ (3)</option>
          <option value="2">⭐⭐ (2)</option>
          <option value="1">⭐ (1)</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;">
        <label>Feedback</label>
        <input type="text" id="ql-feedback" placeholder="Customer's comment..." value="${esc(o.customerFeedback||'')}">
      </div>
    </div>
    <button class="btn-primary" onclick="updateQLStatus('${esc(o.id)}')">✓ Save &amp; Confirm</button>`;
  const panel = document.getElementById('ql-detail');
  panel.classList.add('open');
  panel.scrollIntoView({ behavior:'smooth' });
}

async function updateQLStatus(orderId) {
  const status   = document.getElementById('ql-new-status')?.value;
  const comment  = document.getElementById('ql-comment')?.value.trim()||'';
  const rating   = document.getElementById('ql-rating')?.value;
  const feedback = document.getElementById('ql-feedback')?.value.trim()||'';
  const msg = document.getElementById('ql-msg');
  try {
    await DS.updateOrderStatus(orderId, status, comment, _session?.name||'Quality');
    if (feedback) {
      await DS.updateOrderField(orderId, 'customerFeedback', feedback);
    }
    if (rating) {
      await DS.updateOrderField(orderId, 'customerRating', parseInt(rating));
    }
    msg.textContent='✓ Delivery confirmed!'; msg.className='form-msg success';
    await renderQLOrders(); await renderQLStats();
    setTimeout(()=>{ msg.className='form-msg'; closeDetail(); }, 1500);
  } catch(e) { msg.textContent='Error saving status.'; msg.className='form-msg error'; }
}

function closeDetail() { document.getElementById('ql-detail')?.classList.remove('open'); }

function doSignOut() {
  if (!confirm('Sign out?')) return;
  DS.clearSession(); window.location.href = 'admin-login.html';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
