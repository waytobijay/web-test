<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#ffffff"/>
  

  <!-- Outer B mark: spine + two right-facing D lobes -->
  <g fill="#0b1226">
    <!-- spine -->
    <rect x="140" y="110" width="56" height="292"/>
    <!-- top lobe (right half-ellipse anchored to spine right edge) -->
    <path d="M 196 110
             L 196 252
             A 100 71.0 0 0 0 196 110 Z"/>
    <!-- bottom lobe -->
    <path d="M 196 252
             L 196 402
             A 116 75.0 0 0 0 196 252 Z"/>
  </g>

  <!-- Counters (holes) painted in background fill on top -->
  <g fill="#ffffff">
    <!-- top counter -->
    <path d="M 202 145.0
             L 202 217.0
             A 52 36 0 0 0 202 145.0 Z"/>
    <!-- bottom counter -->
    <path d="M 202 285.0
             L 202 369.0
             A 64 42 0 0 0 202 285.0 Z"/>
  </g>

  <!-- Accent: ascending bars (growth / multiple verticals across industries) -->
  <g>
    <rect x="140" y="426" width="36" height="14" rx="3" fill="#c0152a" opacity="0.95"/>
    <rect x="184" y="426" width="60" height="14" rx="3" fill="#c0152a" opacity="0.75"/>
    <rect x="252" y="426" width="92" height="14" rx="3" fill="#c0152a" opacity="0.55"/>
  </g>
</svg>