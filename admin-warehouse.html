<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Admin — Bista Group</title>
<link rel="stylesheet" href="css/admin-roles.css">
</head>
<body class="wh-theme">

<header class="role-header">
  <div class="role-header-left">
    <div class="role-icon">🏭</div>
    <div>
      <div class="role-title">Warehouse Admin</div>
      <div class="role-subtitle" id="wh-admin-name">Loading…</div>
    </div>
  </div>
  <div class="role-header-right">
    <a href="index.html" target="_blank" class="btn-outline btn-sm">🌐 View Site</a>
    <button class="signout-btn" onclick="doSignOut()">Sign Out</button>
  </div>
</header>

<main class="role-body">

  <!-- Stats -->
  <div class="stats-row" id="wh-stats"></div>

  <!-- Orders Table -->
  <div class="role-card">
    <h3>📦 Incoming Orders</h3>
    <div class="filter-bar">
      <select id="wh-filter" onchange="renderWHOrders()">
        <option value="">All Relevant Orders</option>
        <option value="pending">Order Placed</option>
        <option value="warehouse_processing">At Warehouse</option>
        <option value="warehouse_ready">Ready for Delivery</option>
        <option value="not_ready">Not Ready</option>
      </select>
      <button class="btn-primary btn-sm" onclick="renderWHOrders()">🔄 Refresh</button>
    </div>
    <div class="r-table-wrap"><div id="wh-orders-table"></div></div>
  </div>

  <!-- Detail Panel -->
  <div class="role-card detail-panel" id="wh-detail">
    <div class="detail-header">
      <h3>Order Detail &amp; Status Update</h3>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="wh-detail-content"></div>
    <div id="wh-msg" class="form-msg"></div>
  </div>

</main>

<script src="js/data-service.js"></script>
<script>
const ALLOWED = ['master','warehouse'];
let _session = null;

document.addEventListener('DOMContentLoaded', async () => {
  _session = DS.requireAuth(ALLOWED, 'admin-login.html');
  if (!_session) return;
  document.getElementById('wh-admin-name').textContent = _session.name + ' (' + _session.role + ')';
  await renderWHOrders();
  await renderWHStats();
});

async function renderWHStats() {
  const orders = await DS.getOrders();
  const pending    = orders.filter(o=>o.status==='pending').length;
  const processing = orders.filter(o=>o.status==='warehouse_processing').length;
  const ready      = orders.filter(o=>o.status==='warehouse_ready').length;
  const notReady   = orders.filter(o=>o.status==='not_ready').length;
  const el = document.getElementById('wh-stats');
  if (el) el.innerHTML = [
    { num:pending,    lbl:'New Orders',       color:'#f59e0b' },
    { num:processing, lbl:'In Processing',    color:'#f97316' },
    { num:ready,      lbl:'Ready for Delivery',color:'#3b82f6' },
    { num:notReady,   lbl:'Not Ready',        color:'#ef4444' }
  ].map(s=>`<div class="stat-box"><div class="stat-num" style="color:${s.color};">${s.num}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');
}

async function renderWHOrders() {
  const el = document.getElementById('wh-orders-table'); if (!el) return;
  el.innerHTML = '<p style="color:var(--text-muted);font-size:.84rem;padding:.5rem;">Loading…</p>';
  const filterVal = document.getElementById('wh-filter')?.value;
  const all = await DS.getOrders();
  const orders = filterVal
    ? all.filter(o=>o.status===filterVal)
    : all.filter(o=>['pending','warehouse_processing','warehouse_ready','not_ready'].includes(o.status));
  if (!orders.length) { el.innerHTML='<p style="color:var(--text-muted);font-size:.84rem;padding:.5rem;">No orders in this category.</p>'; return; }
  el.innerHTML=`<table class="r-table"><thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Action</th></tr></thead><tbody>
    ${orders.map(o=>{
      const si=DS.statusInfo(o.status);
      const cust=Object.values(o.customer||{})[0]||'—';
      const items=(o.items||[]).map(i=>i.name+'×'+i.qty).join(', ');
      const date=o.createdAt?new Date(o.createdAt).toLocaleDateString():'—';
      return `<tr><td><code style="font-size:.73rem;">${esc(o.id)}</code></td>
        <td>${esc(cust)}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(items)}">${esc(items)}</td>
        <td>रू ${(o.total||0).toLocaleString()}</td>
        <td><span class="status-badge" style="background:${si.color}22;color:${si.color};border:1px solid ${si.color}44;">${si.icon} ${si.label}</span></td>
        <td>${date}</td>
        <td><button class="btn-primary btn-sm" onclick="openDetail('${esc(o.id)}')">Update</button></td></tr>`;
    }).join('')}</tbody></table>`;
}

async function openDetail(orderId) {
  const orders = await DS.getOrders();
  const o = orders.find(x=>x.id===orderId); if(!o) return;
  const si = DS.statusInfo(o.status);
  const cust = Object.entries(o.customer||{}).map(([k,v])=>`<div class="detail-row"><span class="detail-label">${esc(k)}</span><span>${esc(v)}</span></div>`).join('');
  const items = (o.items||[]).map(i=>`<div class="detail-row"><span>${esc(i.name)} × ${i.qty}</span><span>रू ${(i.price*i.qty).toLocaleString()}</span></div>`).join('');
  const content = document.getElementById('wh-detail-content');
  const msg = document.getElementById('wh-msg');
  if (msg) { msg.className='form-msg'; msg.textContent=''; }
  content.innerHTML=`
    <div class="detail-grid">
      <div>
        <div class="detail-row"><span class="detail-label">Order ID</span><code style="font-size:.78rem;">${esc(o.id)}</code></div>
        <div class="detail-row"><span class="detail-label">Current Status</span><span class="status-badge" style="background:${si.color}22;color:${si.color};border:1px solid ${si.color}44;">${si.icon} ${si.label}</span></div>
        <div class="detail-row"><span class="detail-label">Date</span><span>${o.createdAt?new Date(o.createdAt).toLocaleString():'—'}</span></div>
        <div class="detail-row"><span class="detail-label">Fulfillment</span><span>${esc(o.fulfillment||'—')} ${o.provider?'· '+o.provider:''}</span></div>
        <div class="detail-row"><span class="detail-label">Total</span><span>रू ${(o.total||0).toLocaleString()}</span></div>
        <div class="detail-row"><span class="detail-label">Gateway</span><span>${esc(o.gateway||'—')}</span></div>
      </div>
      <div>
        <div style="font-size:.8rem;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;">CUSTOMER</div>
        ${cust}
        <div style="font-size:.8rem;font-weight:600;color:var(--text-muted);margin:.8rem 0 .4rem;">ITEMS</div>
        ${items}
      </div>
    </div>
    <h4 style="margin:.8rem 0 .6rem;font-size:.9rem;">Update Warehouse Status</h4>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap;">
      <div class="form-group" style="flex:1;min-width:180px;">
        <label>New Status</label>
        <select id="wh-new-status">
          <option value="warehouse_processing" ${o.status==='warehouse_processing'?'selected':''}>🟠 At Warehouse (Processing)</option>
          <option value="warehouse_ready"      ${o.status==='warehouse_ready'?'selected':''}>🔵 Ready for Delivery</option>
          <option value="not_ready"            ${o.status==='not_ready'?'selected':''}>🔴 Not Ready</option>
        </select>
      </div>
      <div class="form-group" style="flex:1;min-width:180px;">
        <label>Comment (optional)</label>
        <input type="text" id="wh-comment" placeholder="e.g. Awaiting stock...">
      </div>
    </div>
    <button class="btn-primary" onclick="updateWHStatus('${esc(o.id)}')">✓ Update Status</button>`;
  const panel = document.getElementById('wh-detail');
  panel.classList.add('open');
  panel.scrollIntoView({ behavior:'smooth' });
}

async function updateWHStatus(orderId) {
  const status  = document.getElementById('wh-new-status')?.value;
  const comment = document.getElementById('wh-comment')?.value.trim()||'';
  const msg = document.getElementById('wh-msg');
  try {
    await DS.updateOrderStatus(orderId, status, comment, _session?.name||'Warehouse');
    msg.textContent='✓ Status updated!'; msg.className='form-msg success';
    await renderWHOrders(); await renderWHStats();
    setTimeout(()=>{ msg.className='form-msg'; closeDetail(); }, 1500);
  } catch(e) { msg.textContent='Error updating status.'; msg.className='form-msg error'; }
}

function closeDetail() {
  document.getElementById('wh-detail')?.classList.remove('open');
}

function doSignOut() {
  if (!confirm('Sign out?')) return;
  DS.clearSession();
  window.location.href = 'admin-login.html';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
